<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🍪 姜饼人：永恒友情的幻梦</title>
    <style>
        :root {
            --gingerbread: #8B4513; --icing-red: #FF6B6B; --icing-green: #51A3A3;
            --icing-white: #FFF8E7; --bg-dark: #1A0F0F; --bg-card: #2D1B1B;
            --star-gold: #FFD700;
        }
        body { font-family: '楷体', serif; background: var(--bg-dark); color: var(--icing-white); padding: 15px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        .game-phase { display: none; }
        .game-phase.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 属性配点 */
        .char-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .char-card { background: var(--bg-card); border: 2px solid var(--icing-red); border-radius: 20px; padding: 20px; }
        .stat-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }
        .pool-box { text-align: center; font-size: 1.2rem; color: var(--star-gold); margin-bottom: 15px; background: var(--gingerbread); padding: 10px; border-radius: 15px; border: 2px solid var(--star-gold); }
        .btn-ctrl { width: 32px; height: 32px; border: none; background: var(--icing-green); color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .stat-val { width: 40px; text-align: center; font-weight: bold; color: var(--star-gold); }

        /* 游戏界面 */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--icing-green); text-align: center; font-size: 0.9rem; }
        .room-box { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 3px solid var(--icing-green); box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
        .action-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; background: var(--icing-white); color: var(--gingerbread); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .npc-btn { background: #9b59b6; color: white; border-bottom: 4px solid #6d3d80; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .nav-btn { padding: 12px; background: var(--icing-green); color: white; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; }

        /* 判定弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 650px; padding: 30px; border-radius: 25px; border: 4px solid var(--icing-red); max-height: 85vh; overflow-y: auto; }
        .res-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .res-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border-top: 3px solid var(--icing-green); }
        .san-warn { color: #ff4d4d; font-weight: bold; text-align: center; margin: 15px 0; padding: 10px; border: 1px dashed #ff4d4d; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-char" class="game-phase active">
        <h1 style="text-align:center; color:var(--icing-red)">🎄 姜饼人：永恒友情的幻梦 🎄</h1>
        <div class="pool-box">当前可用灵魂点数: <span id="total-pool">0</span></div>
        <div class="char-setup" id="setup-root"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="action-btn" onclick="randomStats()">🎲 自动分配 (450点/人)</button>
            <button class="action-btn" onclick="tryStart()" style="background:var(--icing-red); color:white;">进入平安夜 🕯️</button>
        </div>
    </div>

    <div id="phase-main" class="game-phase">
        <div class="status-grid">
            <div id="time-display" class="status-item">⌛ 06:00</div>
            <div id="star-display" class="status-item">⭐ 0/7</div>
            <div id="p-status" class="status-item">❤️ HP: 10 / 🧠 SAN: 100</div>
        </div>
        <div class="room-box">
            <h2 id="room-title" style="text-align:center; color:var(--star-gold)"></h2>
            <div id="room-desc" style="margin:15px 0; border-top:1px solid #444; padding-top:15px;"></div>
            <div id="action-list"></div>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div id="modal-res" class="modal">
    <div class="modal-content">
        <h3 id="res-title" style="text-align:center; color:var(--star-gold)"></h3>
        <div class="res-split" id="res-body"></div>
        <div id="san-box"></div>
        <button class="action-btn" onclick="closeModal()">了解线索 ✨</button>
    </div>
</div>

<script>
    const state = {
        time: 360, stars: 0, currentRoom: '客厅', inventory: [],
        players: [
            { id: 0, name: "A", stats: { STR:75, DEX:75, INT:75, POW:75, EDU:75, LUC:75 }, hp:10, san:100 },
            { id: 1, name: "B", stats: { STR:75, DEX:75, INT:75, POW:75, EDU:75, LUC:75 }, hp:10, san:100 }
        ]
    };

    const STATS = ['STR', 'DEX', 'INT', 'POW', 'EDU', 'LUC'];

    // --- 剧情数据库：全量剧情与差分文本 ---
    const storyDB = {
        '客厅': {
            desc: "壁炉残火跳动。电视里正重播着天文新闻：『今夜百年的七星连珠将开启奇迹...』落地窗外似乎有虎斑色的阴影闪过。",
            actions: [
                { label: "🪟 关闭落地窗", skill: "STR", 
                  p0: { success: "你用力合上了窗户，隔绝了冷风。窗台上有一些奇怪的、不属于猫的爪印。", fail: "窗户卡住了，冷气不断灌入，你感到一阵瑟缩。", crit: "窗户完美锁死！你顺手捡起了窗台掉落的一颗闪亮星星。", fumbles: "巨大的关门声惊动了花园！你听到了野猫‘糖霜’的叫声！" },
                  p1: { success: "你帮忙压住了窗缝，确保仪式环境不被打扰。你注意到 [P1] 没看清爪印的细节。", fail: "你故意没有使劲，让窗户留了一道缝隙，方便星星的光芒射入。", crit: "你稳稳锁住窗户，并悄悄抹掉了窗台边缘可能引起怀疑的粉末。", fumbles: "你用力过猛震碎了玻璃，某种不稳定的魔法波动让野猫发了疯！" }
                },
                { label: "🛋️ 搜查沙发", skill: "DEX",
                  p0: { success: "你在缝隙里发现了一张日记碎片：『...我想去一个永远冒险的地方...』那是 [P2] 的字迹吗？", fail: "只有一堆灰尘，弄脏了你的姜饼小手。", crit: "你翻出了一颗星星和完整的日记页。日记提到幻梦境是永恒的避难所。", fumbles: "你撞倒了台灯！巨大的声响让你心惊胆战。(SAN-5)" },
                  p1: { success: "你抢在 [P1] 产生深度联想前，指着那一颗星星分散了他的注意力。", fail: "你没能拦住 [P1] 看到那张日记碎片的动作。", crit: "你轻巧地把真正关键的『仪式计划』推入了更深处，只留下一张感性的碎纸。", fumbles: "你被沙发垫绊倒，不仅没藏住秘密，还发出了巨大的动静。" }
                }
            ],
            nav: ['餐厅', '卧室', '花园']
        },
        '餐厅': {
            desc: "长餐桌上摆着发霉的丝绒布。那本《幻梦境考据》摊开着，散发出浓郁的蜜糖和腐朽气味。",
            actions: [
                { label: "📖 阅读魔法书", skill: "EDU",
                  p0: { success: "书上写着：『姜饼人为舟，可通往幻梦境。』你意识到这魔法不仅仅是恶作剧。", fail: "文字扭曲如虫，你感到头晕目眩。", crit: "你读到了解除方法，但也发现书页末尾有 [P2] 留下的心形标记。", fumbles: "书中的恐怖插图让你san值狂掉！你感到灵魂在颤抖。(SAN-10)" },
                  p1: { success: "你确认了书中关于『永久转化』的记载。时间快到了。", fail: "你没能准确找到关于『强制回归』的弱点说明。", crit: "你读到了只有契约者可见的红字：『友情是最好的粘合剂』。你感到志在必得。", fumbles: "书页烧焦了你的指尖，这暗示着你的好朋友 A 可能会对这个计划产生抗拒。" }
                }
            ],
            nav: ['客厅', '厨房']
        },
        '卧室': {
            desc: "你们原本的肉身并排躺在月光下。那种死寂的安详感让你感到毛骨悚然。枕头下露出银光。",
            actions: [
                { label: "🗝️ 抽取银钥匙", skill: "DEX",
                  p0: { success: "你拿到了银钥匙，但你发现床上的 [P2] 嘴角挂着一丝诡异的满足微笑。", fail: "你不敢直视自己的脸，手缩了回来。", crit: "你拿到了钥匙，并发现 [P2] 的手心里攥着一根姜饼人的红丝带。", fumbles: "床上的身体突然睁开了眼！你感到一阵撕裂的恐惧。(SAN-10)" },
                  p1: { success: "你成功引导 [P1] 只关注钥匙，没让他发现床底画好的固魂阵。", fail: "你没能拦住 [P1] 靠近枕头的动作。", crit: "你借着拿钥匙的动作，完成了最后的一丝灵魂契约绑定。", fumbles: "你看着自己的肉身，突然产生了一秒钟的后悔，这让你的理智受损。" }
                }
            ],
            nav: ['客厅']
        },
        '花园': {
            desc: "大雪纷飞。雪人弗洛斯蒂正对着你们微笑，它的树枝手臂指向正在排队的七颗星星。",
            actions: [
                { label: "☃️ 与雪人对话", skill: "EDU", npc:true,
                  p0: { success: "雪人说：『变成姜饼人多好，永远不用长大！』它的话让你感到莫名的压抑。", fail: "雪人只是在风中摇晃。", crit: "雪人低声对你耳语：『你的朋友为你准备了一份永恒的圣诞大礼。』", fumbles: "雪人突然崩塌，冰冷的雪块埋住了你。(HP-1)" },
                  p1: { success: "雪人向你眨了眨眼，那是一个只有你们知道的盟约信号。", fail: "雪人由于寒冷没能给出预定的反馈。", crit: "雪人说：『门要开了，主人。』你必须立刻掩盖它的声音。", fumbles: "雪人吐出了黑色的雪，这预示着这份强加的友情可能迎来悲剧。" }
                },
                { label: "⭐ 观察星星", skill: "INT",
                  p0: { success: "七颗星星已经连上了五颗，时间正在飞速流逝。", fail: "云层太厚，看不清楚。", crit: "你发现星光并非垂直落下，而是被某种力量强行引导向书房。", fumbles: "流星闪瞎了你的眼，你感到了宇宙规模的恶意。(SAN-2)" },
                  p1: { success: "你确认了能量汇聚的进度，仪式已经不可逆转了。", fail: "你由于分心观察 [P1] 的反应而错过了最佳读数点。", crit: "星空在你眼中变成了一条闪光的路径，直通永恒的快乐。", fumbles: "星星的连线断裂了一瞬，你的计划出现了致命的变量。" }
                }
            ],
            nav: ['客厅', '阳台']
        },
        '儿童房': {
            desc: "娃娃屋亮着不自然的粉光。这里的玩具似乎都由于魔法而获得了生命，正贪婪地注视着你们。",
            actions: [
                { label: "🏠 玩娃娃屋", skill: "LUC",
                  p0: { success: "你在微缩浴缸里找到了一颗闪亮的星星。", fail: "娃娃屋里的假人让你感到不适。", crit: "你发现娃娃屋里摆着两个姜饼人，正是你和 [P2] 的缩小版。", fumbles: "玩具士兵倒下，差点砸断了你的细腿。(HP-1)" },
                  p1: { success: "你看着这温馨的小屋，这正是你想和 [P1] 永远居住的地方。", fail: "你发现这里的陈设并不如你想象中完美。", crit: "你顺手在这里也放下一颗星星，让幻梦的磁场更加强大。", fumbles: "娃娃屋的屋顶塌了，这不祥的征兆让你心烦意乱。" }
                }
            ],
            nav: ['客厅', '厨房']
        },
        '书房': {
            desc: "魔法阵在地面上跳动。七星的光芒汇聚在中心。这就是最后的祭坛，也是命运的交叉口。",
            actions: [
                { label: "🖋️ 解析研究笔记", skill: "INT",
                  p0: { success: "笔记写着：『第七星连，天门大开。』你意识到如果现在不解除，你们就真的回不去了。", fail: "满书桌的公式让你头疼。", crit: "你终于看清了真相：这是 [P2] 亲手布置的仪式！目的是要把你带走！", fumbles: "笔记上的咒语开始在你耳边低语，试图同化你的理智。(SAN-8)" },
                  p1: { success: "你确认了时间表。还有最后几分钟，你就成功了。", fail: "你没发现笔记中由于墨水晕染而缺失的一个关键咒语。", crit: "你握住了笔，随时准备在灵魂契约上签下两人的名字。", fumbles: "墨水打翻了，遮住了关键的解除方式，但也让你感到了慌乱。" }
                }
            ],
            nav: ['客厅']
        }
    };

    // --- 核心系统引擎 ---
    function init() {
        const root = document.getElementById('setup-root');
        root.innerHTML = state.players.map(p => `
            <div class="char-card">
                <h3>玩家 ${p.name}</h3>
                <input type="text" id="name-${p.id}" value="${p.id==0?'小糖霜(A)':'小肉桂(B)'}" style="width:100%; margin-bottom:10px; padding:5px;">
                ${STATS.map(s => `
                    <div class="stat-row">
                        <span>${s}</span>
                        <div>
                            <button class="btn-ctrl" onclick="modStat(${p.id},'${s}',-5)">-</button>
                            <span class="stat-val" id="v-${p.id}-${s}">${p.stats[s]}</span>
                            <button class="btn-ctrl" onclick="modStat(${p.id},'${s}',5)">+</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
        updatePool();
    }

    function modStat(pid, s, v) {
        const p = state.players[pid];
        const currentTotal = state.players.reduce((sum, py) => sum + Object.values(py.stats).reduce((a,b)=>a+b), 0);
        if(v > 0 && currentTotal >= 900) return;
        if(p.stats[s] + v < 10) return;
        p.stats[s] += v;
        document.getElementById(`v-${pid}-${s}`).textContent = p.stats[s];
        updatePool();
    }

    function updatePool() { document.getElementById('total-pool').textContent = 900 - state.players.reduce((sum, py) => sum + Object.values(py.stats).reduce((a,b)=>a+b), 0); }

    function randomStats() {
        state.players.forEach(p => STATS.forEach(s => p.stats[s] = 75));
        init();
    }

    function tryStart() {
        state.players[0].name = document.getElementById('name-0').value;
        state.players[1].name = document.getElementById('name-1').value;
        document.getElementById('phase-char').classList.remove('active');
        document.getElementById('phase-main').classList.add('active');
        moveTo('客厅');
    }

    function moveTo(room) {
        if(room === '书房' && !state.inventory.includes('钥匙')) {
            alert("【系统】书房门被银钥匙锁住了。"); return;
        }
        state.currentRoom = room;
        updateUI();
    }

    function updateUI() {
        const r = storyDB[state.currentRoom];
        document.getElementById('room-title').textContent = state.currentRoom;
        document.getElementById('room-desc').textContent = r.desc.replace(/\[P1\]/g, state.players[0].name).replace(/\[P2\]/g, state.players[1].name);
        
        document.getElementById('time-display').textContent = `⌛ ${Math.floor(state.time/60)}:00`;
        document.getElementById('star-display').textContent = `⭐ ${state.stars}/7`;
        document.getElementById('p-status').innerHTML = `❤️ HP: ${state.players[0].hp} | 🧠 SAN: ${state.players[0].san}`;

        const alist = document.getElementById('action-list');
        alist.innerHTML = '';
        r.actions.forEach(act => {
            const b = document.createElement('button');
            b.className = 'action-btn' + (act.npc ? ' npc-btn' : '');
            b.textContent = act.label + " (" + act.skill + ")";
            b.onclick = () => rollAction(act);
            alist.appendChild(b);
        });

        const ngrid = document.getElementById('nav-grid');
        ngrid.innerHTML = r.nav.map(n => `<button class="nav-btn" onclick="moveTo('${n}')">${n}</button>`).join('');

        if(state.currentRoom === '书房' && (state.stars >= 7 || state.time >= 540)) {
            const endBtn = document.createElement('button');
            endBtn.className = 'action-btn';
            endBtn.style.background = 'var(--star-gold)';
            endBtn.textContent = "⚖️ 迎接最终仪式";
            endBtn.onclick = handleFinal;
            alist.appendChild(endBtn);
        }
    }

    function rollAction(act) {
        let results = [];
        let globalBad = false;

        state.players.forEach(p => {
            const roll = Math.floor(Math.random()*100)+1;
            const target = p.stats[act.skill];
            let level = 'fail';
            if(roll <= 5) level = 'crit';
            else if(roll <= target) level = 'success';
            else if(roll >= 96) level = 'fumbles';

            if(level === 'fumbles') globalBad = true;
            if(level === 'crit') state.stars++;

            results.push({
                name: p.name, roll, target, level,
                text: act['p'+p.id][level].replace(/\[P1\]/g, state.players[0].name).replace(/\[P2\]/g, state.players[1].name)
            });
        });

        if(act.label.includes("钥匙") && results.some(r=>r.level.includes('success')||r.level==='crit')) state.inventory.push('钥匙');

        showModal(results, globalBad, act.skill);
    }

    function showModal(res, isBad, skill) {
        document.getElementById('res-title').textContent = isBad ? "💀 命运波动" : "🎲 观测结果";
        document.getElementById('res-body').innerHTML = res.map(r => `
            <div class="res-item">
                <strong>${r.name}</strong> [${skill}]:<br>
                <span>${r.text}</span><br>
                <small style="color:#888">检定: ${r.roll}/${r.target} (${translate(r.level)})</small>
            </div>
        `).join('');

        const sbox = document.getElementById('san-box');
        sbox.innerHTML = isBad ? `<div class="san-warn">景象极其骇人！全员遭受精神打击 (SAN -5 / HP -1)</div>` : '';
        if(isBad) {
            state.players[0].san -= 5;
            state.players[0].hp -= 1;
        }
        
        document.getElementById('modal-res').classList.add('active');
    }

    function translate(l) { return {crit:'大成功', success:'成功', fail:'失败', fumbles:'大失败'}[l]; }
    function closeModal() {
        document.getElementById('modal-res').classList.remove('active');
        state.time += 20;
        updateUI();
    }

    function handleFinal() {
        const b = state.players[1].name;
        const a = state.players[0].name;
        const resultText = state.stars >= 7 ? "七星连珠已完成，天门大开！" : "时间已到，魔法强制生效！";
        
        const choice = confirm(`${resultText}\n\n【B（${b}）的最后抉择】\n向 ${a} 坦白这一切，并带他去幻梦境冒险（确定）\n还是在最后关头毁掉阵眼，送他一个人回去，自己承担代价（取消）？`);
        
        if(choice) {
            document.body.innerHTML = `<div style="padding:100px; text-align:center"><h1>🌌 真结局：永恒的童话冒险</h1><p>B握住A的手：『对不起，但我不想看你面对那些痛苦的成长。在这里，我们可以永远是最好的朋友，永远冒险。』</p><p>驯鹿拉着雪橇飞向星空，你们成为了平安夜传说的一部分。</p></div>`;
        } else {
            document.body.innerHTML = `<div style="padding:100px; text-align:center"><h1>🎄 苦涩的救赎：回归现实</h1><p>在彩虹桥开启的瞬间，B推开了A。A在卧室的月光中惊醒，发现一切只是场梦。</p><p>但他转过头，发现睡在旁边的B再也没有醒来，枕边留下一枚碎裂的、散发着肉桂香味的姜饼。</p></div>`;
        }
    }

    init();
</script>
</body>
</html>
