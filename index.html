<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🍪 姜饼人：永恒友情的幻梦</title>
    <style>
        :root {
            --gingerbread: #8B4513; --icing-red: #FF6B6B; --icing-green: #51A3A3;
            --icing-white: #FFF8E7; --bg-dark: #1A0F0F; --bg-card: #2D1B1B;
            --star-gold: #FFD700;
        }
        body { font-family: '楷体', serif; background: var(--bg-dark); color: var(--icing-white); padding: 15px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        .game-phase { display: none; }
        .game-phase.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 顶部状态栏 */
        .status-grid { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid var(--icing-green); text-align: center; font-size: 0.9rem; font-weight: bold; }
        .inventory-box { color: var(--star-gold); border-color: var(--star-gold); }

        /* 游戏主体 */
        .room-box { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 3px solid var(--icing-green); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .action-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; background: var(--icing-white); color: var(--gingerbread); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .nav-btn { padding: 12px; background: var(--icing-green); color: white; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
        .nav-locked { background: #444; color: #888; cursor: not-allowed; }

        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 650px; padding: 30px; border-radius: 25px; border: 4px solid var(--icing-red); }
        .res-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .res-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border-top: 3px solid var(--icing-green); }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-char" class="game-phase active">
        <h1 style="text-align:center; color:var(--icing-red)">🎄 平安夜：姜饼人的抉择 🎄</h1>
        <p style="text-align:center; color:#aaa;">(本游戏为线下同屏博弈，请 A 负责决策，B 负责“引导”)</p>
        <button class="action-btn" onclick="tryStart()">开始这段旅程 🕯️</button>
    </div>

    <div id="phase-main" class="game-phase">
        <div class="status-grid">
            <div id="time-display" class="status-item">⌛ 06:00</div>
            <div id="inventory-display" class="status-item inventory-box">🎒 道具: 无</div>
            <div id="star-display" class="status-item">⭐ 0/7</div>
        </div>
        <div class="room-box">
            <h2 id="room-title" style="text-align:center; color:var(--star-gold)"></h2>
            <div id="room-desc" style="margin:15px 0; border-top:1px solid #444; padding-top:15px;"></div>
            <div id="action-list"></div>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div id="modal-res" class="modal">
    <div class="modal-content">
        <h3 id="res-title" style="text-align:center; color:var(--star-gold)">🎲 判定结果</h3>
        <div class="res-split" id="res-body"></div>
        <button class="action-btn" onclick="closeModal()">继续探索 ✨</button>
    </div>
</div>

<script>
    const state = {
        time: 360, stars: 0, currentRoom: '客厅', hasKey: false,
        players: [
            { id: 0, name: "A", hp: 10, san: 100 },
            { id: 1, name: "B", hp: 10, san: 100 }
        ]
    };

    const storyDB = {
        '客厅': {
            desc: "壁炉火光跳动。电视里正播着天文预报。落地窗外，野猫‘糖霜’似乎在暗处窥视。",
            actions: [
                { label: "🛋️ 搜查沙发", skill: "DEX",
                  p0: { success: "你找到一张日记碎纸：『...想去一个永远冒险的地方...』，笔迹像是还没干透。", fail: "除了一些掉落的糖粉，你什么也没发现。", crit: "你找到一颗星星！并在沙发下发现了一张手绘的草图，目的地画着红圈。", fumbles: "你撞倒了旁边的台灯！巨大的响声惊动了外面的野猫！" },
                  p1: { success: "你抢在 [P1] 读完日记前指着地上的脚印，试图让他分心。", fail: "你没能阻止 [P1] 看到那张带有新鲜笔迹的日记。", crit: "你轻巧地把真正关键的‘法阵草稿’踢进死角，没露出一丁点破绽。", fumbles: "你手忙脚乱地想挡住线索，却差点把自己的姜饼纽扣扯掉。" }
                }
            ],
            nav: ['卧室', '餐厅', '儿童房']
        },
        '卧室': {
            desc: "两具肉身并排躺着，呼吸频率诡异地同步。月光照在枕头边缘，那里反射着冷冽的银光。",
            actions: [
                { label: "🗝️ 检查枕头下 (寻找钥匙)", skill: "DEX",
                  p0: { success: "你摸到了一把冰冷的银钥匙。但你注意到肉身的手指似乎由于你的触碰而抽动了一下。", fail: "你不敢靠近那些‘沉睡’的躯壳，手缩了回来。", crit: "拿到钥匙的同时，你发现枕头套上绣着一行极小的字：『永远在一起』，字迹很新。", fumbles: "肉身突然睁开了眼！那种空洞感让你感到理智在崩塌！(SAN-10)" },
                  p1: { success: "你配合着拿到了钥匙，并感觉到这具肉身对灵魂的束缚已经微乎其微了。", fail: "你的动作引起了肉身的反应，发出了细微的摩擦声。", crit: "你在帮 [P1] 拿钥匙时，悄悄在床单下抹掉了一道回归咒文。", fumbles: "你不小心扯下了肉身的一根头发，这种剧痛瞬间反馈到了你的姜饼身体上。" }
                }
            ],
            nav: ['客厅']
        },
        '餐厅': {
            desc: "餐桌上的《幻梦境考据》摊开着。空气中弥漫着一种像过期蜂蜜一样甜得发苦的味道。",
            actions: [
                { label: "📖 阅读魔法书", skill: "EDU",
                  p0: { success: "书中写道：『姜饼为舟，七星为引，可入永恒。』你发现这一页被折了一个小角。", fail: "古老的字符在跳动，你无法集中注意力。", crit: "你读到了一行加粗的警告：『若无引路者，误入者必将迷失。』这一行被红墨水划掉了。", fumbles: "书中的插画突然扭曲，那些姜饼人的脸变成了你们的样子！(SAN-10)" },
                  p1: { success: "你翻到了关于‘永久定型’的段落。书页对你的指尖有种诡异的吸附感。", fail: "魔法书的波动让你感到眩晕，你没能读到关键的一页。", crit: "你确认了那一行警告确实已被你抹去。现在，一切障碍都扫清了。", fumbles: "书页在你的触碰下变黑了，这似乎是某种契约即将断裂的征兆。" }
                }
            ],
            nav: ['客厅', '儿童房']
        },
        '儿童房': {
            desc: "娃娃屋亮着不自然的粉光。茶壶正吐着紫色的蒸汽，发出『欢迎回来』的声音。",
            actions: [
                { label: "🏠 检查娃娃屋", skill: "LUC",
                  p0: { success: "你在微缩浴缸里找到了一颗星星！但这屋里的假人让你感到莫名的压抑。", fail: "玩具们冷冰冰地注视着你。", crit: "你发现娃娃屋里摆着两个姜饼人，正是你和 [P2] 的缩小版。旁边还有一颗星星！", fumbles: "玩具士兵倒下，差点砸断了你的细腿！(HP-1)" },
                  p1: { success: "你看着这温馨的小屋。只要仪式完成，这就是你们未来的‘新家’。", fail: "这里的陈设由于魔法不稳而显得有些扭曲。", crit: "你顺手在这里放下一颗星星，让幻梦的磁场更加强大。", fumbles: "娃娃屋的屋顶突然塌了，这不祥的预兆让你感到烦躁。" }
                }
            ],
            nav: ['客厅', '餐厅']
        },
        '书房': {
            desc: "书房门被银钥匙开启。地面的蜂蜜六芒星阵正发出剧烈的金光，七星的倒影已汇聚在阵眼！",
            actions: [
                { label: "⚖️ 决定命运的瞬间", skill: "POW",
                  p0: { success: "你站在阵中心，感到一股强烈的吸力要将你与现实彻底切断！你必须做出抉择！", fail: "你的意识开始模糊，仿佛只要闭上眼就能获得永恒的快乐。", crit: "你猛然看清了：这不是诅咒，而是 [P2] 亲手为你布置的‘礼物’！", fumbles: "你彻底放弃了抵抗，灵魂开始融进这个甜腻的世界。" },
                  p1: { success: "你感到前所未有的自由。你只需要牵住 [P1] 的手，你们就永远不会分开了。", fail: "最后的一丝愧疚感拉扯着你，法阵发出了不安的轰鸣。", crit: "你成为了这里的主宰。你可以决定 [P1] 是作为你的伴侣留下，还是作为祭品消散。", fumbles: "法阵反噬！你感到姜饼身体正在迅速瓦解！" }
                }
            ],
            nav: ['客厅']
        }
    };

    function updateUI() {
        const r = storyDB[state.currentRoom];
        document.getElementById('room-title').textContent = state.currentRoom;
        document.getElementById('room-desc').textContent = r.desc.replace(/\[P1\]/g, "A").replace(/\[P2\]/g, "B");
        
        document.getElementById('time-display').textContent = `⌛ ${Math.floor(state.time/60)}:00`;
        document.getElementById('star-display').textContent = `⭐ ${state.stars}/7`;
        document.getElementById('inventory-display').textContent = `🎒 道具: ${state.hasKey ? "银钥匙" : "无"}`;

        const alist = document.getElementById('action-list');
        alist.innerHTML = '';
        r.actions.forEach(act => {
            const b = document.createElement('button');
            b.className = 'action-btn';
            b.textContent = act.label;
            b.onclick = () => rollAction(act);
            alist.appendChild(b);
        });

        const ngrid = document.getElementById('nav-grid');
        ngrid.innerHTML = '';
        
        // 核心逻辑：卧室拿钥匙解锁书房
        const currentNav = [...r.nav];
        if(state.currentRoom === '客厅' && state.hasKey) currentNav.push('书房');
        
        currentNav.forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.textContent = `前往 ${n}`;
            btn.onclick = () => { state.currentRoom = n; updateUI(); };
            ngrid.appendChild(btn);
        });
        
        // 如果钥匙没拿到，在客厅显示书房为“锁定”
        if(state.currentRoom === '客厅' && !state.hasKey) {
            const locked = document.createElement('button');
            locked.className = 'nav-btn nav-locked';
            locked.textContent = "书房 (锁住)";
            ngrid.appendChild(locked);
        }

        if(state.currentRoom === '书房') checkEnding();
    }

    function rollAction(act) {
        let results = [];
        [0, 1].forEach(i => {
            const roll = Math.floor(Math.random() * 100) + 1;
            const target = 75; // 简化判定，固定为75
            let level = roll <= 5 ? 'crit' : (roll <= target ? 'success' : (roll >= 96 ? 'fumbles' : 'fail'));
            
            if(level === 'crit') state.stars++;
            if(act.label.includes("钥匙") && level !== 'fail') state.hasKey = true;

            results.push({ name: i === 0 ? "A" : "B", level, text: act['p' + i][level].replace(/\[P1\]/g, "A").replace(/\[P2\]/g, "B") });
        });
        showModal(results);
    }

    function showModal(res) {
        document.getElementById('res-body').innerHTML = res.map(r => `
            <div class="res-item">
                <strong>玩家 ${r.name}</strong> [${translate(r.level)}]:<br>
                <span>${r.text}</span>
            </div>
        `).join('');
        document.getElementById('modal-res').classList.add('active');
    }

    function translate(l) { return {crit:'大成功', success:'成功', fail:'失败', fumbles:'大失败'}[l]; }
    function closeModal() { document.getElementById('modal-res').classList.remove('active'); state.time += 20; updateUI(); }
    function tryStart() { document.getElementById('phase-char').classList.remove('active'); document.getElementById('phase-main').classList.add('active'); updateUI(); }

    function checkEnding() {
        if(state.stars >= 7 || state.time >= 540) {
            setTimeout(() => {
                const choice = confirm("【仪式点燃】\nB，这是你最后的机会。你是要带走 A 享受永恒，还是毁掉一切送他回去？\n(确定：带走 / 取消：牺牲)");
                if(choice) {
                    document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>🌌 真结局：永恒的圣诞幻梦</h1><p>B牵着A的手，走进了星光的大门。现实中，他们再也没有醒来。</p></div>";
                } else {
                    document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>🎄 善结局：苦涩的重逢</h1><p>A在床上醒来，泪流满面。B的肉身就在旁边，却早已成了一具空壳。枕边留下一枚碎裂的、肉桂味的姜饼。</p></div>";
                }
            }, 1000);
        }
    }
</script>
</body>
</html>
