<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🍪 姜饼人圣诞夜：甜蜜谎言 🎄</title>
    <style>
        :root {
            --gingerbread: #8B4513; --icing-red: #FF6B6B; --icing-green: #51A3A3;
            --icing-white: #FFF8E7; --bg-dark: #1A0F0F; --bg-card: #2D1B1B;
            --star-gold: #FFD700;
        }
        body { font-family: '楷体', serif; background: var(--bg-dark); color: var(--icing-white); padding: 15px; }
        .container { max-width: 700px; margin: 0 auto; }
        .game-phase { display: none; }
        .game-phase.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 配点界面 */
        .char-card { background: var(--bg-card); border: 2px solid var(--icing-red); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stat-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 10px; }
        .stat-controls { display: flex; align-items: center; gap: 10px; }
        .btn-ctrl { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--icing-green); color: white; cursor: pointer; font-weight: bold; }
        .stat-val { width: 40px; text-align: center; color: var(--star-gold); font-weight: bold; font-size: 1.2rem; }
        .pool-counter { text-align: center; font-size: 1.1rem; color: var(--icing-red); margin: 10px 0; }

        /* 游戏界面 */
        .status-bar { display: flex; justify-content: space-around; background: var(--gingerbread); padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--star-gold); }
        .room-card { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 3px solid var(--icing-green); position: relative; }
        .action-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: var(--icing-white); color: var(--gingerbread); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .npc-btn { background: var(--magic-purple, #9b59b6); color: white; border-bottom: 4px solid #6d3d80; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .nav-btn { padding: 12px; background: var(--icing-green); color: white; border: none; border-radius: 10px; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 550px; padding: 30px; border-radius: 25px; border: 4px solid var(--icing-red); }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-char" class="game-phase active">
        <h1 style="text-align:center; color:var(--icing-red)">🍪 姜饼人属性构建</h1>
        <p style="text-align:center; font-size: 0.9rem;">剩余可用点数: <span id="total-pool" class="pool-counter" style="font-size: 1.5rem;">450</span></p>
        
        <div id="char-list">
            <div class="char-card">
                <h3>玩家 A: <input type="text" id="p0-name" value="小糖霜" style="background:transparent; border:none; border-bottom:1px solid #666; color:white;"></h3>
                <div id="p0-stats"></div>
            </div>
            <div class="char-card">
                <h3>玩家 B: <input type="text" id="p1-name" value="小肉桂" style="background:transparent; border:none; border-bottom:1px solid #666; color:white;"></h3>
                <div id="p1-stats"></div>
            </div>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button class="action-btn" onclick="randomizeStats()" style="background:#666; color:white;">🎲 随机分配</button>
            <button class="action-btn" onclick="tryStart()">开始冒险 ✨</button>
        </div>
    </div>

    <div id="phase-main" class="game-phase">
        <div class="status-bar">
            <div>⏳ <span id="val-time">06:00</span></div>
            <div>⭐ <span id="val-stars">0/7</span></div>
            <div>❤️ <span id="val-hp">10</span></div>
        </div>
        <div class="room-card">
            <h2 id="room-title"></h2>
            <div id="room-desc" style="margin:15px 0; line-height:1.8;"></div>
            <div id="action-list"></div>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div id="modal-res" class="modal">
    <div class="modal-content">
        <h3 id="res-title" style="text-align:center; color:var(--star-gold)"></h3>
        <div id="res-body" style="margin:20px 0; line-height:1.6; font-size:1.1rem;"></div>
        <button class="action-btn" onclick="closeModal()">继续</button>
    </div>
</div>

<script>
    const state = {
        time: 360, stars: 0, currentRoom: '客厅', inventory: [],
        players: [
            { name: "A", stats: { STR: 75, DEX: 75, INT: 75, POW: 75, EDU: 75, LUC: 75 }, hp: 10, san: 100 },
            { name: "B", stats: { STR: 75, DEX: 75, INT: 75, POW: 75, EDU: 75, LUC: 75 }, hp: 10, san: 100 }
        ],
        pool: 0 // 剩余点数由系统动态计算
    };

    const STAT_NAMES = ['STR', 'DEX', 'INT', 'POW', 'EDU', 'LUC'];

    // --- 初始化配点界面 ---
    function initCharSetup() {
        [0, 1].forEach(pIdx => {
            const container = document.getElementById(`p${pIdx}-stats`);
            container.innerHTML = STAT_NAMES.map(s => `
                <div class="stat-row">
                    <span>${s}</span>
                    <div class="stat-controls">
                        <button class="btn-ctrl" onclick="modStat(${pIdx},'${s}',-5)">-</button>
                        <span class="stat-val" id="p${pIdx}-${s}">${state.players[pIdx].stats[s]}</span>
                        <button class="btn-ctrl" onclick="modStat(${pIdx},'${s}',5)">+</button>
                    </div>
                </div>
            `).join('');
        });
        updatePool();
    }

    function modStat(pIdx, stat, val) {
        const currentSum = Object.values(state.players[0].stats).reduce((a,b)=>a+b) + Object.values(state.players[1].stats).reduce((a,b)=>a+b);
        if (val > 0 && currentSum >= 900) return; // 总上限450*2=900
        if (state.players[pIdx].stats[stat] + val < 10) return;
        state.players[pIdx].stats[stat] += val;
        document.getElementById(`p${pIdx}-${stat}`).textContent = state.players[pIdx].stats[stat];
        updatePool();
    }

    function updatePool() {
        const currentSum = Object.values(state.players[0].stats).reduce((a,b)=>a+b) + Object.values(state.players[1].stats).reduce((a,b)=>a+b);
        document.getElementById('total-pool').textContent = 900 - currentSum;
    }

    function randomizeStats() {
        [0, 1].forEach(pIdx => {
            STAT_NAMES.forEach(s => state.players[pIdx].stats[s] = 75);
        });
        initCharSetup();
    }

    // --- 游戏逻辑 ---
    const storyDB = {
        '客厅': {
            desc: "壁炉残存着余温，落地窗外风声凄冷。沙发缝隙里似乎有什么东西在闪光。",
            actions: [
                { type: 'act', label: "推上落地窗 🪟", skill: 'STR', 
                  msg: { 
                      success: "你们合力推上了窗户，[P2]顺手捡起了一颗掉落在窗台的闪光星星。", 
                      fail: "窗户纹丝不动，寒风吹得[P1]的糖霜外壳微微发裂。" 
                  } 
                },
                { type: 'act', label: "检查沙发阴影 🕵️", skill: 'INT',
                  msg: { 
                      crit: "你在深处摸到一张残破日记：『仪式必须在七星连珠时完成...肉体是多余的。』[P2]神色如常地接过日记说：『只是童话故事里的反派日记啦。』",
                      success: "你发现了一颗被藏起来的装饰星。B（[P2]）在一旁似乎早就知道它在那儿。",
                      fail: "除了满手灰尘，你什么也没发现。" 
                  }
                }
            ],
            nav: ['餐厅', '卧室', '花园']
        },
        '儿童房': {
            desc: "娃娃屋亮着不自然的微光。一个陶瓷茶壶正坐在微型餐桌旁，眼神空洞地注视着你们。",
            actions: [
                { type: 'npc', label: "与茶壶对话 ☕", skill: 'EDU',
                  msg: {
                      crit: "茶壶吐出一缕蒸汽：『[P2]大人，祭坛的蜂蜜已经涂好了。』你愣住了，[P2]立刻笑着敲了敲茶壶：『它坏掉了，在胡言乱语呢。』",
                      success: "茶壶发出咯咯声：『又回来了？欢迎欢迎。』它表现出对[P2]异常的熟悉感。",
                      fail: "茶壶只是机械地重复着：『平安夜快乐，尊贵的饼干。』"
                  }
                }
            ],
            nav: ['客厅', '厨房']
        },
        '卧室': {
            desc: "原本的身体并排躺在床上。这种感觉让你感到眩晕。枕头下似乎压着什么。",
            actions: [
                { type: 'act', label: "摸索枕头 🗝️", skill: 'DEX',
                  msg: {
                      success: "你拿到了银钥匙！[P2]看到钥匙时，眼中闪过一丝迫切的光芒。",
                      fail: "身体动了一下，你吓得缩回了手，SAN值感到些许波动。"
                  }
                }
            ],
            nav: ['客厅']
        },
        '书房': {
            desc: "巨大的法阵占据了地面。蜂蜜与糖霜的气味浓郁得令人作呕。天窗正对着七星。",
            actions: [
                { type: 'act', label: "解析法阵符文 📖", skill: 'INT',
                  msg: {
                      crit: "这不是变回人类的咒语！这是永久的灵魂剥离！你猛然回头，[P2]已经堵住了门口，笑容甜蜜。』",
                      success: "你发现法阵的核心是『永恒』。B解释说，这就是变回人类、永远幸福的意思。",
                      fail: "法阵太复杂了，你只觉得这些符号让你感到很安全，很想躺上去。"
                  }
                }
            ],
            nav: ['客厅']
        }
    };

    function tryStart() {
        state.players[0].name = document.getElementById('p0-name').value;
        state.players[1].name = document.getElementById('p1-name').value;
        document.getElementById('phase-char').classList.remove('active');
        document.getElementById('phase-main').classList.add('active');
        moveTo('客厅');
    }

    function moveTo(room) {
        if(room === '书房' && !state.inventory.includes('银钥匙')) {
            alert("书房的门被锁住了。"); return;
        }
        state.currentRoom = room;
        updateUI();
    }

    function updateUI() {
        const room = storyDB[state.currentRoom];
        document.getElementById('room-title').textContent = state.currentRoom;
        document.getElementById('room-desc').textContent = room.desc.replace(/\[P2\]/g, state.players[1].name);
        document.getElementById('val-time').textContent = `${Math.floor(state.time/60)}:00`.padStart(5,'0');
        document.getElementById('val-stars').textContent = `${state.stars}/7`;
        document.getElementById('val-hp').textContent = state.players[0].hp;

        const actList = document.getElementById('action-list');
        actList.innerHTML = '';
        room.actions.forEach(a => {
            const btn = document.createElement('button');
            btn.className = 'action-btn' + (a.type==='npc' ? ' npc-btn' : '');
            btn.textContent = a.label;
            btn.onclick = () => doRoll(a);
            actList.appendChild(btn);
        });

        const navGrid = document.getElementById('nav-grid');
        navGrid.innerHTML = room.nav.map(n => `<button class="nav-btn" onclick="moveTo('${n}')">前往 ${n}</button>`).join('');

        if(state.currentRoom === '书房' && state.stars >= 7) {
            const endBtn = document.createElement('button');
            endBtn.className = 'action-btn';
            endBtn.style.background = 'var(--star-gold)';
            endBtn.textContent = "⚖️ 迎接最终仪式";
            endBtn.onclick = handleFinal;
            actList.appendChild(endBtn);
        }
    }

    function doRoll(act) {
        const p = state.players[0]; // 主要检定者为A
        const roll = Math.floor(Math.random()*100)+1;
        const target = p.stats[act.skill];
        let result = 'fail';
        
        if (roll <= 5) result = 'crit';
        else if (roll <= target) result = 'success';
        
        // 分支文本处理
        let finalMsg = act.msg[result] || act.msg['fail'];
        if (result === 'crit' && !act.msg['crit']) finalMsg = act.msg['success']; // 没做大成功分支时用成功分支

        document.getElementById('res-title').textContent = result==='fail' ? "⚠️ 检定失败" : "✨ 检定成功";
        document.getElementById('res-body').innerHTML = `
            <p>${finalMsg.replace(/\[P1\]/g, p.name).replace(/\[P2\]/g, state.players[1].name)}</p>
            <div style="margin-top:20px; font-size:0.8rem; color:#888;">暗骰检定: ${roll} / ${target} (${act.skill})</div>
        `;
        document.getElementById('modal-res').classList.add('active');
        
        if (result !== 'fail') state.stars++;
        state.time += 20;
        updateUI();
    }

    function handleFinal() {
        const bName = state.players[1].name;
        const choice = confirm(`【B（${bName}）的抉择】\n仪式开始，七星连珠！你要坦白一切并带走A，还是尝试中断仪式？\n确定：前往幻梦境(TE) / 取消：回归人类(HE)`);
        if(choice) {
            document.body.innerHTML = `<div style="padding:100px; text-align:center;"><h1>🌌 真结局：永恒幻梦</h1><p>B牵着A的手，骑着驯鹿飞向星空。肉体在余烬中消散，而你们在童话中永生。</p></div>`;
        } else {
            document.body.innerHTML = `<div style="padding:100px; text-align:center;"><h1>🎄 好结局：平安夜的奇迹</h1><p>法阵破碎，你们在书房地板醒来。虽然现实很平庸，但至少你们还是人类。</p></div>`;
        }
    }

    function closeModal() { document.getElementById('modal-res').classList.remove('active'); }

    // 初始化
    initCharSetup();
</script>
</body>
</html>
