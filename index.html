<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🍪 姜饼人圣诞夜：双人同屏博弈版</title>
    <style>
        :root {
            --gingerbread: #8B4513; --icing-red: #FF6B6B; --icing-green: #51A3A3;
            --icing-white: #FFF8E7; --bg-dark: #1A0F0F; --bg-card: #2D1B1B;
            --star-gold: #FFD700;
        }
        body { font-family: '楷体', serif; background: var(--bg-dark); color: var(--icing-white); padding: 15px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; }
        .game-phase { display: none; }
        .game-phase.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 配点界面 */
        .char-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .char-card { background: var(--bg-card); border: 2px solid var(--icing-red); border-radius: 20px; padding: 20px; }
        .stat-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; }
        .pool-box { text-align: center; font-size: 1.2rem; color: var(--star-gold); margin-bottom: 20px; background: var(--gingerbread); padding: 10px; border-radius: 15px; }
        .btn-ctrl { width: 30px; height: 30px; border: none; background: var(--icing-green); color: white; border-radius: 5px; cursor: pointer; }
        .stat-val { width: 40px; text-align: center; font-weight: bold; }

        /* 游戏界面 */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .p-panel { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--icing-green); font-size: 0.9rem; }
        .room-box { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 3px solid var(--icing-green); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .action-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: var(--icing-white); color: var(--gingerbread); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 1rem; }
        .npc-btn { background: #9b59b6; color: white; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .nav-btn { padding: 10px; background: var(--icing-green); color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 650px; padding: 30px; border-radius: 25px; border: 4px solid var(--icing-red); max-height: 80vh; overflow-y: auto; }
        .res-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .res-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border-left: 4px solid var(--icing-green); }
        .san-warn { color: #ff4d4d; font-weight: bold; text-align: center; margin-top: 15px; padding: 10px; border: 1px dashed #ff4d4d; }
    </style>
</head>
<body>

<div class="container">
    <div id="phase-char" class="game-phase active">
        <h1 style="text-align:center; color:var(--icing-red)">🎄 姜饼灵魂契约 🎄</h1>
        <div class="pool-box">当前可用灵魂点数: <span id="total-pool">0</span></div>
        <div class="char-setup" id="setup-root"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="action-btn" onclick="randomStats()">🎲 自动分配</button>
            <button class="action-btn" onclick="tryStart()" style="background:var(--icing-red); color:white;">进入梦境 🕯️</button>
        </div>
    </div>

    <div id="phase-main" class="game-phase">
        <div class="status-grid">
            <div id="p0-status" class="p-panel"></div>
            <div id="p1-status" class="p-panel"></div>
        </div>
        <div class="room-box">
            <h2 id="room-title" style="text-align:center; color:var(--star-gold)"></h2>
            <div id="room-desc" style="margin:15px 0; border-top:1px solid #444; padding-top:15px;"></div>
            <div id="action-list"></div>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div id="modal-res" class="modal">
    <div class="modal-content">
        <h3 id="res-title" style="text-align:center; color:var(--star-gold)"></h3>
        <div class="res-split" id="res-body"></div>
        <div id="san-box"></div>
        <button class="action-btn" onclick="closeModal()">收悉并继续 ✨</button>
    </div>
</div>

<script>
    // --- 核心状态 ---
    const state = {
        time: 360, stars: 0, currentRoom: '客厅', inventory: [],
        players: [
            { id: 0, name: "A", stats: { STR:75, DEX:75, INT:75, POW:75, EDU:75, LUC:75 }, hp:10, san:100 },
            { id: 1, name: "B", stats: { STR:75, DEX:75, INT:75, POW:75, EDU:75, LUC:75 }, hp:10, san:100 }
        ]
    };

    const STATS = ['STR', 'DEX', 'INT', 'POW', 'EDU', 'LUC'];

    // --- 剧情数据库：中立化描述 ---
    const storyDB = {
        '客厅': {
            desc: "壁炉里残存的红光像某种古老的注视。落地窗的锁扣在寒风中微微颤动，沙发缝隙间透出一丝不属于这里的金属反光。",
            actions: [
                { label: "检查窗台阴影", skill: "INT", 
                  p0: { success: "你注意到阴影的形状并不随光线改变，像是被某种力量刻意固定在了窗边。", fail: "阴影中只有厚重的灰尘和冰冷的冷气。", crit: "你猛然发现，阴影的排列呈现出某种祭坛的雏形，且这些痕迹显然是刚留下不久的。", fumbles: "阴影中似乎有一只手猛地抓住了你的糖霜脚踝！你感到灵魂一阵颤栗。" },
                  p1: { success: "你发现那团阴影能完美遮蔽一些细小的动作，是一个极好的视觉死角。", fail: "你没能从杂乱的阴影中理出头绪。", crit: "你意识到这些阴影正是仪式的一部分，它们能帮你隐藏更多不为人知的举动。", fumbles: "阴影的失控超乎你的想象，它差点在 [P1] 面前暴露了你未曾擦净的痕迹。" }
                },
                { label: "搜索沙发缝隙", skill: "DEX",
                  p0: { success: "你摸到了一枚星星，但你注意到 [P2] 的表情在你触碰沙发时有一瞬间的僵硬。", fail: "里面塞满了棉絮，你什么也没找到。", crit: "你翻到了一枚星星和一张残缺的纸条，上面写着：『不要醒来』。字迹看起来极其眼熟。", fumbles: "缝隙里藏着一枚锋利的图钉！你的指尖被割开了。这不像是巧合。" },
                  p1: { success: "你成功抢在 [P1] 发现更多细节前，配合他拿到了那颗星星。", fail: "你翻找的动作有些迟钝，什么都没发现。", crit: "你轻巧地把一个原本可能暴露身份的小物件推到了更深处，并顺手拿到了星星。", fumbles: "你在慌乱中打翻了沙发垫，发出的巨大响声引起了 [P1] 的高度警觉。" }
                }
            ],
            nav: ['卧室', '餐厅', '厨房']
        },
        '卧室': {
            desc: "你们原本的人类肉体躺在月光下，面色安详得甚至有些诡异。枕头下露出银钥匙的一角，仿佛在诱惑着姜饼人的触碰。",
            actions: [
                { label: "抽取银钥匙", skill: "DEX",
                  p0: { success: "你拿到了钥匙，但你感觉到床上 [P2] 的身体似乎并没有呼吸的起伏，只有一种木偶般的静止感。", fail: "你的手在颤抖，无法准确触碰到那把冰冷的钥匙。", crit: "你拿到钥匙的同时，注意到 [P2] 的枕头下藏着一圈用来封印灵魂的盐粒。", fumbles: "你触碰钥匙时发出了尖锐的摩擦声，床上的两具肉身竟同时翻了个身，直勾勾地对着你！" },
                  p1: { success: "你稳住了 [P1] 的肩膀，帮他顺利拿到了要是，并没有触动枕头下的东西。", fail: "你的注意力被床上的肉身分散了，没能提供任何帮助。", crit: "你顺势确认了枕头下的封印完好无损，并用钥匙的冷光遮蔽了 [P1] 的视线。", fumbles: "你由于过度紧张，不小心按到了肉身的胸口，那空洞的触感几乎让你发疯。" }
                }
            ],
            nav: ['客厅']
        },
        '餐厅': {
            desc: "长餐桌上摆放着发霉的丝绒桌布。中心那本皮质的《幻梦境考据》无风自动，书页间散发出甜腻到腐烂的味道。",
            actions: [
                { label: "研读古籍", skill: "EDU",
                  p0: { success: "书上说：『星星汇聚之日，即为永恒之始。』但你发现“永恒”这个词是用红墨水后来涂上去的。", fail: "扭曲的拉丁文像虫子一样游走，你一个字也看不清。", crit: "你发现书页夹缝里有一根 [P2] 衣服上的纤维。他/她似乎很久以前就一直在翻看这本书。", fumbles: "书页中传来凄厉的哭喊，你感到大脑仿佛被滚烫的蜜糖灌入，那是理智崩塌的声音。" },
                  p1: { success: "你确认了收集进度。只要再多两颗星，法阵就会彻底闭合。", fail: "书上的内容由于魔法的波动变得模糊，你也无法解析。", crit: "你读到了只有『契约者』能看到的金字：『伴侣的灵魂亦可作为养料』。你感到胸口一阵温热。", fumbles: "古籍的力量拒绝了你的窥探，它察觉到了你内心深处的动摇。" }
                }
            ],
            nav: ['客厅', '厨房']
        },
        '儿童房': {
            desc: "娃娃屋里灯火通明。陶瓷茶壶正发着尖锐的哨音，那些玩具兵的眼珠似乎在随着你们的移动而移动。",
            actions: [
                { label: "与茶壶对话", skill: "EDU", npc:true,
                  p0: { success: "茶壶说：『又见面了。』它对你们展现出一种令人毛骨悚然的‘老友感’。", fail: "它只是在喷吐蒸汽，什么也没表达。", crit: "茶壶对你低语：『有人提前为你预订了位置，就在那个最漂亮的饼干盒里。』", fumbles: "茶壶喷出的糖浆像胶水一样粘住了你的嘴，那股甜味让你反胃。" },
                  p1: { success: "你向茶壶微微点头，它立刻安静了下来，显得异常顺从。", fail: "你没能读懂这些造物的暗示。", crit: "茶壶向你汇报：『仪式准备就绪，主人。』你必须在 [P1] 产生疑惑前掩盖这声音。", fumbles: "茶壶突然失控，吐出了大量黑色污垢，这象征着你对这里的掌控力正在流逝。" }
                }
            ],
            nav: ['客厅', '厨房']
        },
        '书房': {
            desc: "这就是终点。地面上的蜂蜜六芒星阵正散发出金色的强光，七星连珠的星光通过天窗笔直地射向阵眼。",
            actions: [
                { label: "启动/解析仪式", skill: "POW",
                  p0: { success: "你站在阵眼，感到一种虚幻的幸福正在剥夺你的感官，你似乎开始忘记自己为什么要回去了。", fail: "你感到四肢麻木，根本无法抵抗这股魔力的吸引。", crit: "你惊恐地察觉，法阵的能量流向并非向上，而是在向下吞噬！这是要把你们永远囚禁在姜饼里的死结！", fumbles: "你的意识直接断裂。你开始疯狂地欢笑，把法阵上的符文当成糖果吞下。" },
                  p1: { success: "星光入体。你感到前所未有的自由，那个充满痛苦的现实世界终于要与你告别了。", fail: "法阵似乎对你还有些排斥，因为你的内心还残留着对 [P1] 的一丝愧疚。", crit: "你成为了这里的主宰。你可以随心所欲地修改契约——让 [P1] 成为你的玩偶，或者永恒的伴侣。", fumbles: "仪式产生了剧烈的排异反应！你感到姜饼身体正在瓦解，两边的人格都在撕裂。" }
                }
            ],
            nav: ['客厅']
        }
    };

    // --- 核心逻辑引擎 ---
    function init() {
        const root = document.getElementById('setup-root');
        root.innerHTML = state.players.map(p => `
            <div class="char-card">
                <h3>玩家 ${p.name}</h3>
                <input type="text" id="name-${p.id}" value="${p.id==0?'小糖霜':'小肉桂'}" style="width:100%; margin-bottom:10px;">
                ${STATS.map(s => `
                    <div class="stat-row">
                        <span>${s}</span>
                        <div>
                            <button class="btn-ctrl" onclick="modStat(${p.id},'${s}',-5)">-</button>
                            <span class="stat-val" id="v-${p.id}-${s}">${p.stats[s]}</span>
                            <button class="btn-ctrl" onclick="modStat(${p.id},'${s}',5)">+</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
        updatePool();
    }

    function modStat(pid, s, v) {
        const p = state.players[pid];
        const currentTotal = getAllSum();
        if(v > 0 && currentTotal >= 900) return;
        if(p.stats[s] + v < 5) return;
        p.stats[s] += v;
        document.getElementById(`v-${pid}-${s}`).textContent = p.stats[s];
        updatePool();
    }

    function getAllSum() { return state.players.reduce((sum, p) => sum + Object.values(p.stats).reduce((a,b)=>a+b), 0); }
    function updatePool() { document.getElementById('total-pool').textContent = 900 - getAllSum(); }

    function randomStats() {
        state.players.forEach(p => STATS.forEach(s => p.stats[s] = 75));
        init();
    }

    function tryStart() {
        state.players[0].name = document.getElementById('name-0').value;
        state.players[1].name = document.getElementById('name-1').value;
        document.getElementById('phase-char').classList.remove('active');
        document.getElementById('phase-main').classList.add('active');
        moveTo('客厅');
    }

    function moveTo(room) {
        if(room === '书房' && !state.inventory.includes('钥匙')) {
            alert("书房门紧锁。"); return;
        }
        state.currentRoom = room;
        updateUI();
    }

    function updateUI() {
        const r = storyDB[state.currentRoom];
        document.getElementById('room-title').textContent = state.currentRoom;
        document.getElementById('room-desc').textContent = r.desc.replace(/\[P1\]/g, state.players[0].name).replace(/\[P2\]/g, state.players[1].name);
        
        [0,1].forEach(i => {
            const p = state.players[i];
            document.getElementById(`p${i}-status`).innerHTML = `<strong>${p.name}</strong> | HP: ${p.hp} | SAN: ${p.san}`;
        });

        const alist = document.getElementById('action-list');
        alist.innerHTML = '';
        r.actions.forEach(act => {
            const b = document.createElement('button');
            b.className = 'action-btn' + (act.npc ? ' npc-btn' : '');
            b.textContent = act.label + " (" + act.skill + ")";
            b.onclick = () => rollAction(act);
            alist.appendChild(b);
        });

        const ngrid = document.getElementById('nav-grid');
        ngrid.innerHTML = r.nav.map(n => `<button class="nav-btn" onclick="moveTo('${n}')">${n}</button>`).join('');
    }

    function rollAction(act) {
        let results = [];
        let globalBad = false;

        state.players.forEach(p => {
            const roll = Math.floor(Math.random()*100)+1;
            const target = p.stats[act.skill];
            let level = 'fail';
            if(roll <= 5) level = 'crit';
            else if(roll <= target) level = 'success';
            else if(roll >= 96) level = 'fumbles';

            if(level === 'fumbles') globalBad = true;

            results.push({
                name: p.name, roll, target, level,
                text: act['p'+p.id][level].replace(/\[P1\]/g, state.players[0].name).replace(/\[P2\]/g, state.players[1].name)
            });
        });

        if(act.label.includes("钥匙") && results.some(r=>r.level!=='fail')) state.inventory.push('钥匙');

        showModal(results, globalBad, act.skill);
    }

    function showModal(res, isBad, skill) {
        document.getElementById('res-title').textContent = isBad ? "💀 命运波动" : "🎲 观测结果";
        document.getElementById('res-body').innerHTML = res.map(r => `
            <div class="res-item">
                <strong>${r.name}</strong> [${skill}]:<br>
                <span style="font-size:1.1rem">${r.text}</span><br>
                <small style="color:#888">检定: ${r.roll}/${r.target} (${translate(r.level)})</small>
            </div>
        `).join('');

        const sbox = document.getElementById('san-box');
        sbox.innerHTML = '';
        if(isBad) {
            sbox.innerHTML = `<div class="san-warn">景象过于骇人！全员进行理智检定 (SAN -5)</div>`;
            state.players.forEach(p => p.san -= 5);
        }
        
        document.getElementById('modal-res').classList.add('active');
    }

    function translate(l) { return {crit:'大成功', success:'成功', fail:'失败', fumbles:'大失败'}[l]; }
    function closeModal() {
        document.getElementById('modal-res').classList.remove('active');
        state.time += 20;
        if(state.players.some(p=>p.san<=0)) {
            alert("有人彻底疯了... 幻梦崩塌。");
            location.reload();
        }
        updateUI();
    }

    // 最终结算（由B玩家线下宣布结局）
    function handleFinal() {
        const b = state.players[1].name;
        const choice = confirm(`【B（${b}）的最后审判】\n你是要彻底割裂现实，带走 A 的灵魂（确定）；\n还是牺牲自己，让 A 回归肉身（取消）？`);
        if(choice) {
            document.body.innerHTML = `<div style="padding:100px; text-align:center"><h1>🌌 真结局：永恒幻梦</h1><p>B 抹去了 A 最后的记忆。在那个永远是圣诞夜的姜饼别墅里，你们将永远幸福地生活下去，直到身体化为尘埃。</p></div>`;
        } else {
            document.body.innerHTML = `<div style="padding:100px; text-align:center"><h1>🎄 善结局：苦涩的苏醒</h1><p>B 引导了能量回流。A 在卧室的尖叫中苏醒，而 B 的位置只剩下一枚破碎的、散发着肉桂香味的姜饼残片。</p></div>`;
        }
    }

    init();
</script>
</body>
</html>
