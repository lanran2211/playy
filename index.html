<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍪 姜饼人圣诞夜：完备版 🎄</title>
    <style>
        :root {
            --gingerbread: #8B4513; --icing-red: #FF6B6B; --icing-green: #51A3A3;
            --icing-white: #FFF8E7; --bg-dark: #1A0F0F; --bg-card: #2D1B1B;
            --text-light: #FFF8E7; --star-gold: #FFD700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', '楷体', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #2D1B1B 100%);
            color: var(--text-light); min-height: 100vh; padding: 10px; overflow-x: hidden;
        }
        .snowflakes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .snowflake { position: absolute; color: var(--icing-white); font-size: 1.5rem; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        .game-phase { display: none; animation: fadeIn 0.3s ease; }
        .game-phase.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 2; }
        .title-section { text-align: center; padding: 20px 0; }
        .main-title { font-size: 2.5rem; color: var(--icing-red); text-shadow: 3px 3px 0 var(--gingerbread); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .game-card { background: var(--bg-card); border: 3px solid var(--icing-red); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .status-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .status-item { text-align: center; padding: 5px; background: var(--gingerbread); border-radius: 10px; border: 2px solid var(--icing-red); }
        .status-label { font-size: 0.7rem; }
        .status-value { font-size: 1.1rem; font-weight: bold; color: var(--star-gold); }
        .inventory-items { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .item { padding: 5px 10px; background: linear-gradient(135deg, var(--icing-red), var(--icing-green)); border-radius: 8px; font-size: 0.8rem; border: 1px solid var(--star-gold); }
        .map-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .floor-section { background: rgba(139, 69, 19, 0.3); border: 2px solid var(--icing-red); border-radius: 15px; padding: 10px; }
        .room-btn { width: 100%; padding: 10px; margin: 5px 0; background: var(--icing-red); border: 2px solid var(--star-gold); border-radius: 10px; color: white; cursor: pointer; transition: 0.2s; }
        .room-btn.current-room { background: var(--icing-green); }
        .room-btn.disabled { background: #666; cursor: not-allowed; opacity: 0.6; }
        .log-container { background: #000; border-radius: 10px; padding: 10px; height: 150px; overflow-y: auto; font-size: 0.85rem; }
        .btn { padding: 12px; background: var(--icing-red); border: 3px solid var(--star-gold); border-radius: 15px; color: white; cursor: pointer; width: 100%; font-family: inherit; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); border: 4px solid var(--icing-red); border-radius: 20px; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .action-option { padding: 12px; margin: 8px 0; background: var(--gingerbread); border: 2px solid var(--icing-red); border-radius: 10px; cursor: pointer; }
        .action-option.used { opacity: 0.5; cursor: not-allowed; }
        .dice-result { text-align: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin: 5px; }
        .critical-success { color: #4CAF50; font-weight: bold; }
        .critical-failure { color: #FF4444; font-weight: bold; }
        .consequence-box { padding: 8px; border-radius: 5px; margin: 5px 0; border-left: 4px solid; }
        .consequence-good { background: rgba(76, 175, 80, 0.2); border-color: #4CAF50; }
        .consequence-bad { background: rgba(244, 67, 54, 0.2); border-color: #F44336; }
    </style>
</head>
<body>
    <div class="snowflakes" id="snowflakes"></div>
    <div class="container">
        <div id="phase-intro" class="game-phase active">
            <div class="title-section"><h1 class="main-title">🍪 姜饼人圣诞夜 🎄</h1></div>
            <div class="game-card">
                <p>🎁 魔法让你们变成了姜饼人！你们只有3小时的时间（12回合）。</p><br>
                <p>探索别墅，收集7颗星星，或者寻找解除魔法的仪式。小心饥饿的野猫！</p><br>
                <button class="btn" onclick="startCharacterCreation()">开始冒险 ✨</button>
            </div>
        </div>

        <div id="phase-creation" class="game-phase">
            <div class="title-section"><h1 class="main-title">塑造姜饼人</h1></div>
            <div id="character-creation" class="game-card"></div>
        </div>

        <div id="phase-game" class="game-phase">
            <div class="status-card">
                <div class="status-item"><div class="status-label">时间</div><div id="game-time" class="status-value">06:00</div></div>
                <div class="status-item"><div class="status-label">位置</div><div id="current-location" class="status-value">客厅</div></div>
                <div class="status-item"><div class="status-label">星星</div><div id="star-count" class="status-value">0/7</div></div>
                <div class="status-item"><div class="status-label">回合</div><div id="current-turn" class="status-value">1</div></div>
                <div class="status-item"><div class="status-label">剩余</div><div id="time-left" class="status-value">180m</div></div>
            </div>
            <div class="game-card">
                <h4 style="color:var(--icing-green)">📦 物品栏 (<span id="item-count">0</span>)</h4>
                <div class="inventory-items" id="inventory-items"></div>
            </div>
            <div class="game-card" id="player-status"></div>
            <div class="map-grid" id="map-btns">
                <div class="floor-section">
                    <h5>一楼</h5>
                    <button class="room-btn" onclick="tryEnterRoom('客厅')">客厅 🛋️</button>
                    <button class="room-btn" onclick="tryEnterRoom('餐厅')">餐厅 🍽️</button>
                    <button class="room-btn" onclick="tryEnterRoom('厨房')">厨房 🔪</button>
                </div>
                <div class="floor-section">
                    <h5>二楼</h5>
                    <button class="room-btn" onclick="tryEnterRoom('主卧室')">主卧室 🛏️</button>
                    <button class="room-btn" onclick="tryEnterRoom('书房')">书房 📚</button>
                </div>
                <div class="floor-section">
                    <h5>三楼/户外</h5>
                    <button class="room-btn" onclick="tryEnterRoom('阳台')">阳台 🌟</button>
                    <button class="room-btn" onclick="tryEnterRoom('花园')">花园 🌷</button>
                </div>
            </div>
            <div class="log-container" id="game-log"></div>
        </div>

        <div id="phase-ending" class="game-phase">
            <div class="game-card" style="text-align:center">
                <h1 id="ending-title" class="main-title"></h1>
                <div id="ending-icon" style="font-size:4rem"></div>
                <div id="ending-content" style="margin:20px 0; line-height:1.6"></div>
                <button class="btn" onclick="location.reload()">重新开始 🔄</button>
            </div>
        </div>
    </div>

    <div id="room-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-room-title" style="color:var(--icing-red)"></h3>
            <p id="modal-room-description" style="margin:10px 0; font-size:0.9rem"></p>
            <div id="room-actions"></div>
            <button class="btn" style="background:var(--icing-green)" onclick="endTurn()">结束回合离开 🚪</button>
        </div>
    </div>

    <div id="check-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="check-title"></h3>
            <div id="check-story"></div>
            <div id="dice-results"></div>
            <div id="consequences"></div>
            <button class="btn" onclick="closeCheckModal()">继续 ➡️</button>
        </div>
    </div>
    <script>
        // --- 核心数据修复 ---
        const gameData = {
            players: [
                { name: '', stats: {str:50, dex:50, int:50, pow:50, edu:50, luc:50}, hp:10, san:100, starsCollected:0, playerLetter:'A', color:'var(--icing-red)' },
                { name: '', stats: {str:50, dex:50, int:50, pow:50, edu:50, luc:50}, hp:10, san:100, starsCollected:0, playerLetter:'B', color:'var(--icing-green)' }
            ],
            currentRoom: '客厅',
            gameState: {
                time: '06:00', turn: 1, stars: 0, totalStars: 7, timeLeft: 180,
                items: [], windowClosed: false, ritualRoomOpen: false, foundBodies: false,
                spellbookRead: false, silverKeyFound: false
            },
            currentTurnActions: []
        };

        const roomDescriptions = {
            '客厅': '落地窗开着一条缝，寒风夹杂雪花飘入。壁炉已熄灭，沙发缝里似乎有东西。',
            '餐厅': '桌上摆着精美但冰冷的圣诞大餐。一本地卷边缘发黄的《幻梦境考据》放在主位。',
            '厨房': '锋利的刀具和沉重的锅碗瓢盆对姜饼人来说像巨人的武器。',
            '主卧室': '两个熟悉的人影（你们的身体）躺在床上沉睡，枕头下露出一角金属光泽。',
            '书房': '房门紧锁，需要特定的钥匙。如果你进去了，那里有解除魔法的最后线索。',
            '阳台': '从这里可以俯瞰花园。今晚的七颗星正连成一条诡异的直线。',
            '花园': '雪地里有一串猫爪印。雪人弗洛斯蒂似乎在注视着你们。'
        };

        // --- 初始化雪花 ---
        function initSnow() {
            const container = document.getElementById('snowflakes');
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = 'snowflake';
                s.innerHTML = '❄️';
                s.style.left = Math.random()*100+'%';
                s.style.animationDuration = (Math.random()*5+5)+'s';
                s.style.opacity = Math.random();
                container.appendChild(s);
            }
        }

        // --- 状态更新 ---
        function updateUI() {
            document.getElementById('game-time').textContent = gameData.gameState.time;
            document.getElementById('current-location').textContent = gameData.currentRoom;
            document.getElementById('star-count').textContent = `${gameData.gameState.stars}/7`;
            document.getElementById('current-turn').textContent = gameData.gameState.turn;
            document.getElementById('time-left').textContent = (180 - (gameData.gameState.turn-1)*15) + 'm';
            
            const inv = document.getElementById('inventory-items');
            inv.innerHTML = gameData.gameState.items.length ? '' : '<div class="item">空</div>';
            gameData.gameState.items.forEach(it => {
                inv.innerHTML += `<div class="item">${it}</div>`;
            });
            document.getElementById('item-count').textContent = gameData.gameState.items.length;

            const ps = document.getElementById('player-status');
            ps.innerHTML = '<h4 style="color:var(--icing-green)">👥 角色状态</h4><div style="display:flex;gap:10px">';
            gameData.players.forEach(p => {
                ps.innerHTML += `<div style="flex:1;border:1px solid ${p.color};padding:5px;border-radius:10px">
                    <b style="color:${p.color}">${p.name}</b><br>❤️ HP: ${p.hp} | 😊 SAN: ${p.san}</div>`;
            });
            ps.innerHTML += '</div>';
            
            checkEndings();
        }

        function addLog(msg) {
            const log = document.getElementById('game-log');
            log.innerHTML += `<div>[${gameData.gameState.time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // --- 核心逻辑：房间进入 ---
        function tryEnterRoom(room) {
            if (room === '书房' && !gameData.gameState.ritualRoomOpen) {
                if (gameData.gameState.items.includes('银钥匙')) {
                    addLog("你使用银钥匙打开了书房！");
                    gameData.gameState.ritualRoomOpen = true;
                } else {
                    addLog("书房门锁着，你需要找到钥匙。");
                    return;
                }
            }
            enterRoom(room);
        }

        function enterRoom(room) {
            gameData.currentRoom = room;
            gameData.currentTurnActions = [];
            const modal = document.getElementById('room-modal');
            document.getElementById('modal-room-title').textContent = room;
            document.getElementById('modal-room-description').textContent = roomDescriptions[room];
            renderActions(room);
            modal.classList.add('active');
            updateUI();
        }

        function renderActions(room) {
            const container = document.getElementById('room-actions');
            container.innerHTML = '';
            const actions = getActionsForRoom(room);
            actions.forEach(act => {
                const div = document.createElement('div');
                div.className = 'action-option' + (gameData.currentTurnActions.includes(act.id) ? ' used' : '');
                div.innerHTML = `<b>${act.title}</b><br><small>${act.desc}</small>`;
                if(!gameData.currentTurnActions.includes(act.id)) {
                    div.onclick = () => performAction(act);
                }
                container.appendChild(div);
            });
        }

        function performAction(act) {
            gameData.currentTurnActions.push(act.id);
            document.getElementById('check-title').textContent = act.title;
            const storyDiv = document.getElementById('check-story');
            const diceDiv = document.getElementById('dice-results');
            const consDiv = document.getElementById('consequences');
            storyDiv.innerHTML = ''; diceDiv.innerHTML = ''; consDiv.innerHTML = '';

            gameData.players.forEach(p => {
                const roll = Math.floor(Math.random()*100)+1;
                const target = p.stats[act.skill] || 50;
                let res = roll <= target ? 'success' : 'failure';
                if(roll <= 5) res = 'crit_success';
                if(roll >= 96) res = 'crit_fail';

                const outcome = act.outcomes[res];
                diceDiv.innerHTML += `<div class="dice-result"><span style="color:${p.color}">${p.name}</span> 掷骰: ${roll}/${target} -> <span class="${res.includes('crit')?res.replace('_','-'):''}">${res}</span></div>`;
                storyDiv.innerHTML += `<p style="margin:5px 0;border-left:3px solid ${p.color};padding-left:5px">${p.name}: ${outcome.text}</p>`;
                
                if(outcome.hp) p.hp += outcome.hp;
                if(outcome.san) p.san += outcome.san;
                if(outcome.star) { gameData.gameState.stars++; p.starsCollected++; }
                if(outcome.item && !gameData.gameState.items.includes(outcome.item)) gameData.gameState.items.push(outcome.item);
                if(outcome.flag) gameData.gameState[outcome.flag] = true;
            });

            document.getElementById('check-modal').classList.add('active');
            renderActions(gameData.currentRoom);
            updateUI();
        }

        function endTurn() {
            document.getElementById('room-modal').classList.remove('active');
            gameData.gameState.turn++;
            let [h, m] = gameData.gameState.time.split(':').map(Number);
            m += 15; if(m>=60){ h++; m=0; }
            gameData.gameState.time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            
            // 随机猫袭击判定
            if(!gameData.gameState.windowClosed && Math.random() < 0.2) {
                addLog("🐱 野猫糖霜从窗户潜入了！姜饼人们受到了惊吓！");
                gameData.players.forEach(p => p.san -= 5);
            }
            updateUI();
        }

        function closeCheckModal() {
            document.getElementById('check-modal').classList.remove('active');
            checkEndings();
        }

        // --- 剧情库修复与扩充 ---
        function getActionsForRoom(room) {
            const base = {
                '客厅': [
                    { id:'l1', title:'关窗', skill:'str', desc:'用力推上沉重的落地窗', outcomes: {
                        crit_success: { text:'不仅关上了窗，还在窗缝里捡到一颗星星！', star:1, flag:'windowClosed' },
                        success: { text:'窗户关紧了，现在很安全。', flag:'windowClosed' },
                        failure: { text:'窗户纹丝不动，你太弱小了。' },
                        crit_fail: { text:'窗户反弹撞到了你！', hp:-1 }
                    }},
                    { id:'l2', title:'搜查沙发', skill:'int', desc:'在坐垫下寻找线索', outcomes: {
                        success: { text:'你找到了一张日记碎片，记录着仪式的方法。', flag:'foundDiary' },
                        failure: { text:'除了陈年灰尘一无所获。' },
                        crit_success: { text:'你找到了日记，还有一颗掉落的星星！', star:1, flag:'foundDiary' },
                        crit_fail: { text:'你掉进了沙发缝里，费了好大劲才爬出来。', san:-5 }
                    }}
                ],
                '餐厅': [
                    { id:'d1', title:'阅读魔法书', skill:'edu', desc:'解析晦涩难懂的古文字', outcomes: {
                        success: { text:'你理解了咒语：必须集齐星星才能回归。', flag:'spellbookRead' },
                        failure: { text:'这些字像是在扭动，让你头晕目眩。', san:-2 },
                        crit_success: { text:'书中掉出了一颗星星！', star:1, flag:'spellbookRead' },
                        crit_fail: { text:'不可名状的恐怖内容冲击了你的大脑！', san:-10 }
                    }}
                ],
                '主卧室': [
                    { id:'m1', title:'搜查枕头', skill:'dex', desc:'轻手轻脚地翻找', outcomes: {
                        success: { text:'你找到了闪烁着寒光的银钥匙！', item:'银钥匙' },
                        failure: { text:'枕头下只有一团乱糟糟的棉花。' },
                        crit_success: { text:'你拿到了钥匙，还顺带发现了一颗星！', item:'银钥匙', star:1 },
                        crit_fail: { text:'你惊醒了沉睡的身体，san值狂掉！', san:-15 }
                    }}
                ],
                '书房': [
                    { id:'s1', title:'启动仪式', skill:'pow', desc:'利用收集的星星引导灵魂回归', outcomes: {
                        success: { text:'仪式发出了光芒！回归进度增加了。', flag:'ritualProgress' },
                        failure: { text:'魔力不足，星星没有反应。' },
                        crit_success: { text:'强烈的圣光笼罩了你们！', star:1, flag:'ritualProgress' },
                        crit_fail: { text:'仪式反噬！你的姜饼身体几乎碎裂。', hp:-3 }
                    }}
                ],
                '花园': [
                    { id:'g1', title:'与雪人对话', skill:'luc', desc:'它似乎想告诉你什么', outcomes: {
                        success: { text:'雪人吐出一颗星星，并祝你好运。', star:1 },
                        failure: { text:'它只是个普通的雪堆。' },
                        crit_success: { text:'雪人把隐藏的星星全给了你！', star:2 },
                        crit_fail: { text:'雪人倒塌压住了你，极其倒霉。', hp:-1 }
                    }}
                ],
                '阳台': [
                    { id:'y1', title:'观测星空', skill:'int', desc:'寻找星星的规律', outcomes: {
                        success: { text:'你捕捉到了一颗正在坠落的微型星！', star:1 },
                        failure: { text:'天太冷了，你只想回屋。' },
                        crit_success: { text:'七星连珠的能量汇聚在你们身上！', star:2 },
                        crit_fail: { text:'你在边缘滑了一跤，差点掉下去！', san:-5 }
                    }}
                ]
            };
            return base[room] || [{id:'none', title:'调查', skill:'luc', outcomes:{success:{text:'没什么发现。'},failure:{text:'没什么发现。'}}}];
        }

        // --- 结局判定 ---
        function checkEndings() {
            if (gameData.gameState.stars >= 7) {
                showEnding("完美回归！", "🎄", "你们收集了所有的星星，在平安夜的最后一秒，姜饼身体融化，你们在温暖的床上醒来。");
            } else if (gameData.gameState.turn > 12) {
                showEnding("永恒的姜饼", "🍪", "时间到了。你们没能变回人类，从此成为了圣诞树上最精致的装饰品。");
            } else if (gameData.players.some(p => p.hp <= 0)) {
                showEnding("支离破碎", "💔", "姜饼身体太脆弱了，你们最终碎成了甜美的残渣。");
            } else if (gameData.players.some(p => p.san <= 0)) {
                showEnding("疯狂的饼干", "😱", "无法理解的魔法让你们的精神彻底崩溃，你们现在认为自己真的只是一块饼干。");
            }
        }

        function showEnding(title, icon, text) {
            document.getElementById('phase-game').classList.remove('active');
            document.getElementById('phase-ending').classList.add('active');
            document.getElementById('ending-title').textContent = title;
            document.getElementById('ending-icon').textContent = icon;
            document.getElementById('ending-content').textContent = text;
        }

        // --- 人物创建流程 ---
        function startCharacterCreation() {
            const container = document.getElementById('character-creation');
            container.innerHTML = '<h3>分配属性点 (每人固定属性)</h3>';
            gameData.players.forEach((p, i) => {
                container.innerHTML += `
                    <div style="margin:10px 0; border:1px solid ${p.color}; padding:10px; border-radius:10px">
                        玩家 ${p.playerLetter} 名字: <input type="text" id="p${i}-name" value="姜饼人${p.playerLetter}"><br>
                        力量(STR): <input type="number" id="p${i}-str" value="50" style="width:50px"> 
                        敏捷(DEX): <input type="number" id="p${i}-dex" value="50" style="width:50px"><br>
                        智力(INT): <input type="number" id="p${i}-int" value="50" style="width:50px"> 
                        意志(POW): <input type="number" id="p${i}-pow" value="50" style="width:50px">
                    </div>`;
            });
            container.innerHTML += `<button class="btn" onclick="confirmCharacters()">完成并进入客厅</button>`;
            document.getElementById('phase-intro').classList.remove('active');
            document.getElementById('phase-creation').classList.add('active');
        }

        function confirmCharacters() {
            gameData.players.forEach((p, i) => {
                p.name = document.getElementById(`p${i}-name`).value;
                p.stats.str = parseInt(document.getElementById(`p${i}-str`).value);
                p.stats.dex = parseInt(document.getElementById(`p${i}-dex`).value);
                p.stats.int = parseInt(document.getElementById(`p${i}-int`).value);
                p.stats.pow = parseInt(document.getElementById(`p${i}-pow`).value);
            });
            document.getElementById('phase-creation').classList.remove('active');
            document.getElementById('phase-game').classList.add('active');
            addLog("游戏开始！你们在客厅的壁炉旁醒来...");
            updateUI();
        }

        window.onload = () => { initSnow(); };
    </script>
</body>
</html>
